<style>
  :root {
    --bg: #f9f6f0; --surface: #ffffff; --surface2: #f2ede6;
    --border: #e0d8cc; --border2: #ccc4b4;
    --green: #2d7a50; --green-light: #eef5f1; --green-mid: #9acbb0;
    --red: #a03428; --red-light: #fdf2f1; --red-mid: #dba09a;
    --yellow: #b07d2a; --text: #2e2820; --muted: #8a7a68; --muted2: #b0a090;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header {
    padding: 1.5rem 2rem 1rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .header-text h1 { font-family: var(--mono); font-size: 1rem; font-weight: 400; color: var(--muted); }
  .header-text h1 span { color: var(--green); }
  .header-text p { font-size: 0.82rem; color: var(--muted2); margin-top: 0.2rem; }
  .pt-flag { flex-shrink: 0; width: 48px; height: 32px; border-radius: 3px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.15); margin-top: 2px; }

  /* TABS */
  .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 2rem; }
  .tab { font-family: var(--mono); font-size: 0.8rem; padding: 0.75rem 1.25rem; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .view { display: none; padding: 1.5rem 2rem 3rem; max-width: 680px; }
  .view.active { display: block; }

  /* CATEGORY FILTER */
  .cat-bar {
    display: flex; gap: 0.4rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .cat-btn {
    font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.06em;
    padding: 0.3rem 0.75rem; border: 1px solid var(--border); border-radius: 99px;
    background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .cat-btn:hover { border-color: var(--green-mid); color: var(--text); }
  .cat-btn.active { background: var(--green); border-color: var(--green); color: #fff; }

  /* EXPRESSION CARDS */
  .section-title {
    font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--red); margin: 2rem 0 0.75rem;
    border-left: 3px solid var(--red); padding-left: 0.65rem;
  }
  .section-title:first-child { margin-top: 0; }

  .exp-grid { display: flex; flex-direction: column; gap: 0.75rem; }

  .exp-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 1.25rem 1.5rem; transition: border-color 0.2s;
  }
  .exp-card:hover { border-color: var(--green-mid); }
  .exp-card.featured { border-color: var(--green); border-width: 2px; }

  .exp-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.5rem; }
  .exp-pt {
    font-family: var(--mono); font-size: 1.15rem; color: var(--green); font-weight: 700;
    cursor: pointer; line-height: 1.3;
  }
  .exp-pt:hover { text-decoration: underline; text-decoration-color: var(--green); text-underline-offset: 3px; }
  .exp-speak {
    background: var(--green-light); border: 1px solid var(--green-mid); color: var(--green);
    font-size: 0.9rem; padding: 0.3rem 0.75rem; border-radius: 99px;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0; font-family: var(--mono); font-size: 0.7rem;
  }
  .exp-speak:hover, .exp-speak.playing { background: var(--green); color: #fff; border-color: var(--green); }

  .exp-en { font-size: 0.88rem; color: var(--muted); font-style: italic; margin-bottom: 0.75rem; }

  .exp-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .exp-tag {
    font-family: var(--mono); font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.15rem 0.45rem; border-radius: 2px;
  }
  .tag-register-informal { background: var(--green-light); color: var(--green); border: 1px solid var(--green-mid); }
  .tag-register-formal   { background: #eef3fb; color: #2a5fa0; border: 1px solid #a0b8d8; }
  .tag-lesson { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }
  .tag-essential { background: #fdf6e8; color: var(--yellow); border: 1px solid #e0c070; }

  .exp-body { font-size: 0.84rem; color: var(--text); line-height: 1.75; }
  .exp-body strong { color: var(--green); font-family: var(--mono); }
  .exp-body em { color: var(--muted); }

  .exp-examples { margin-top: 0.85rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .exp-example {
    background: var(--surface2); border-radius: 4px; padding: 0.55rem 0.85rem;
    cursor: pointer; transition: background 0.15s; border: 1px solid transparent;
  }
  .exp-example:hover { border-color: var(--green-mid); background: var(--green-light); }
  .exp-example .ex-pt { font-family: var(--mono); font-size: 0.82rem; color: var(--text); margin-bottom: 0.15rem; }
  .exp-example .ex-pt strong { color: var(--green); }
  .exp-example .ex-en { font-size: 0.75rem; color: var(--muted); font-style: italic; }

  /* COMPARISON BLOCK */
  .compare-block {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; margin-bottom: 0.75rem;
  }
  .compare-title {
    font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); padding: 0.75rem 1.25rem;
    background: var(--surface2); border-bottom: 1px solid var(--border);
  }
  .compare-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border);
    gap: 0.5rem; align-items: center; cursor: pointer; transition: background 0.15s;
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-row:hover { background: var(--surface2); }
  .compare-row .cr-pt { font-family: var(--mono); font-size: 0.9rem; color: var(--green); font-weight: 600; }
  .compare-row .cr-en { font-size: 0.82rem; color: var(--text); }
  .compare-row .cr-note { font-size: 0.75rem; color: var(--muted); font-style: italic; }

  /* FLASHCARD STYLES */
  .fc-wrap { max-width: 540px; margin: 0 auto; }
  .fc-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 0.5rem; flex-wrap: wrap; }
  .fc-counter { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }
  .fc-ctrl { font-family: var(--mono); font-size: 0.72rem; background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 0.4rem 0.9rem; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .fc-ctrl:hover { border-color: var(--green); color: var(--green); }
  .fc-progress { height: 2px; background: var(--border); border-radius: 1px; margin-bottom: 1.5rem; overflow: hidden; }
  .fc-progress-fill { height: 100%; background: var(--green); transition: width 0.3s; }

  .fc-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    min-height: 300px; display: flex; flex-direction: column;
    align-items: center; padding: 1.5rem 2rem; text-align: center;
  }
  .fc-hints { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 1.25rem; }
  .fc-cat-tag { font-family: var(--mono); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--red); margin-bottom: 0.75rem; }
  .fc-en-prompt { font-size: 1.05rem; color: var(--text); font-weight: 300; line-height: 1.5; margin-bottom: 1.25rem; padding: 0 0.5rem; }
  .fc-divider { width: 2rem; height: 1px; background: var(--border); margin-bottom: 1.25rem; }
  .fc-pt-answer {
    font-family: var(--mono); font-size: 1.25rem; color: var(--green); font-weight: 700;
    filter: blur(7px); transition: filter 0.3s; cursor: pointer;
    line-height: 1.4; margin-bottom: 1.25rem; padding: 0.1rem 0.5rem;
    background: var(--border); border-radius: 4px; display: inline-block;
  }
  .fc-pt-answer.revealed { filter: blur(0); background: transparent; }
  .fc-speak-pill {
    background: var(--surface2); border: 1px solid var(--border); color: var(--green);
    padding: 0.35rem 1.2rem; border-radius: 99px; cursor: pointer;
    transition: all 0.2s; font-size: 1rem; margin-bottom: 1rem;
  }
  .fc-speak-pill:hover, .fc-speak-pill.playing { background: var(--green); color: #fff; border-color: var(--green); }
  .fc-ex-pt { font-style: italic; font-size: 0.82rem; color: var(--text); filter: blur(5px); transition: filter 0.3s; cursor: pointer; margin-bottom: 0.2rem; background: var(--border); border-radius: 3px; padding: 0.05rem 0.3rem; display: inline-block; }
  .fc-ex-pt.revealed { filter: blur(0); background: transparent; }
  .fc-ex-en { font-size: 0.75rem; color: var(--muted); filter: blur(5px); transition: filter 0.3s; background: var(--border); border-radius: 3px; padding: 0.05rem 0.3rem; display: inline-block; margin-bottom: 1rem; }
  .fc-ex-en.revealed { filter: blur(0); background: transparent; }
  .fc-nav { display: flex; gap: 1rem; margin-top: auto; }
  .fc-nav-btn { font-family: var(--mono); font-size: 0.82rem; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.55rem 1.25rem; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .fc-nav-btn:hover { border-color: var(--green); color: var(--green); }
</style>
</head>

<script>
const WORKER_URL = "https://portuguese-tts.drh-dave.workers.dev";
let currentAudio = null;

async function speak(text, btnEl) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (btnEl) btnEl.classList.add('playing');
  try {
    const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
    if (!res.ok) throw new Error();
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = currentAudio.onerror = () => { if (btnEl) btnEl.classList.remove('playing'); URL.revokeObjectURL(url); currentAudio = null; };
    currentAudio.play();
  } catch(e) { if (btnEl) btnEl.classList.remove('playing'); }
}

      { pt: '— Posso sentar aqui? — <strong>Na boa!</strong>', en: '— Can I sit here? — Sure, go ahead!' },
      { pt: '— Tudo bem? — <strong>Na boa.</strong>', en: '— Everything okay? — All good.' },
    ]
  },
  {
    id: 'tenha-bom-fds',
    pt: 'Tenha um bom fim de semana.',
    en: 'Have a good weekend.',
    category: 'despedidas',
    register: 'formal',
    lesson: 'Aula 4',
    featured: false,
    body: '<strong>Tenha</strong> is the formal imperative of <strong>ter</strong>. Use this with anyone you address as <strong>você</strong> — colleagues, neighbours, shopkeepers. For close friends you might say <strong>bom fim de semana</strong> without the verb.',
    examples: [
      { pt: '<strong>Tenha um bom fim de semana!</strong> Até segunda.', en: 'Have a good weekend! See you Monday.' },
      { pt: '— Até à próxima! — <strong>Tenha um bom fim de semana!</strong>', en: '— Until next time! — Have a good weekend!' },
    ]
  },
  {
    id: 'estou-a',
    pt: 'Estou a + infinitivo',
    en: 'I am -ing (present continuous)',
    category: 'essenciais',

    lesson: 'Aula 4',
    featured: true,
    body: 'One of the most generative structures in European Portuguese. <strong>Estou a</strong> + any infinitive = I am doing that thing right now. You only need to know the infinitive. In speech <em>estou</em> often contracts to <em>tou</em>.',
    examples: [
      { pt: '<strong>Estou a</strong> aprender português.', en: "I'm learning Portuguese." },
      { pt: '<strong>Estou a</strong> esperar o autocarro.', en: "I'm waiting for the bus." },
      { pt: '<strong>Estou a</strong> chegar.', en: "I'm on my way / I'm arriving." },
    ]
  },
  {
    id: 'mente-note',
    pt: 'adjectivo + -mente',
    en: 'adjective + -ly (makes adverbs)',
    category: 'essenciais',
    register: 'informal',
    lesson: 'Aula 4',
    featured: false,
    body: 'Add <strong>-mente</strong> to the feminine form of an adjective to make an adverb. <strong>frequente → frequentemente</strong>, <strong>lenta → lentamente</strong>, <strong>rápida → rapidamente</strong>. Adjectives with accents drop the accent: <strong>fácil → facilmente</strong>.',
    examples: [
      { pt: 'Fala <strong>lentamente</strong>, por favor.', en: 'Speak slowly, please.' },
      { pt: 'É <strong>provavelmente</strong> o melhor restaurante.', en: "It's probably the best restaurant." },
    ]
  },
  {
    id: 'homem-prevenido',
    pt: 'Um homem prevenido vale por dois.',
    en: 'Forewarned is forearmed.',
    category: 'idiomaticas',
    register: 'informal',
    lesson: 'Aula 3',
    featured: false,
    body: 'A proverb meaning that someone who prepares in advance is worth twice as much. Literally: "a forewarned man is worth two." The Portuguese equivalent of "forewarned is forearmed." Used when praising preparation or caution.',
    examples: [
      { pt: 'Leva sempre um chapéu de chuva. <strong>Um homem prevenido vale por dois!</strong>', en: 'Always bring an umbrella. Forewarned is forearmed!' },

  },
  {
    id: 'barriga-dar-horas',
    pt: 'Ter a barriga a dar horas.',
    en: "To be starving. (Literally: my belly is chiming the hours)",
    category: 'palavras-do-dia',
    register: 'informal',
    lesson: 'Aula 3',
    featured: false,
    body: 'A vivid idiom for being very hungry. Literally "to have your belly chiming the hours" — like a clock striking loudly. Much more expressive than just saying <strong>tenho fome</strong>. Use it informally when you\'re seriously hungry.',
    examples: [
      { pt: 'Ainda não almocei. <strong>Tenho a barriga a dar horas!</strong>', en: "I haven't had lunch yet. I'm absolutely starving!" },
      { pt: '— Vamos comer? — Sim, <strong>tenho a barriga a dar horas</strong>!', en: '— Shall we eat? — Yes, I\'m starving!' },
    ]

const CATEGORIES = [
  { id: 'all',           label: 'Todas' },
  { id: 'essenciais',    label: 'Essenciais' },
  { id: 'despedidas',    label: 'Despedidas' },
  { id: 'idiomaticas',   label: 'Idiomáticas' },
  { id: 'palavras-do-dia', label: 'Palavras do Dia' },
];

// ── STATE ─────────────────────────────────────────────────────────
let activeCategory = 'all';
let fcDeck = [], fcIdx = 0, fcRevealed = false;

// ── CATEGORY BAR ──────────────────────────────────────────────────
function buildCatBar() {
  const bar = document.getElementById('catBar');
  CATEGORIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c.id === 'all' ? ' active' : '');
    btn.textContent = c.label;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = c.id;
      renderExpressoes();
    };
    bar.appendChild(btn);
  });
}

// ── RENDER EXPRESSOES ──────────────────────────────────────────────
function getFiltered() {
  if (activeCategory === 'all') return EXPRESSOES;
  return EXPRESSOES.filter(e => e.category === activeCategory);
}

function renderExpressoes() {
  const container = document.getElementById('expressaoContent');
  container.innerHTML = '';
  const items = getFiltered();

  // Featured first
  const featured = items.filter(e => e.featured);
  const rest = items.filter(e => !e.featured);

  if (featured.length) {
    const ft = document.createElement('div');
    ft.className = 'section-title';
    ft.textContent = 'Em Destaque';
    container.appendChild(ft);
    const grid = document.createElement('div');
    grid.className = 'exp-grid';
    featured.forEach(e => grid.appendChild(makeCard(e)));
    container.appendChild(grid);
  }

  // Group rest by category if showing all
  if (activeCategory === 'all') {
    const catOrder = ['despedidas', 'essenciais', 'idiomaticas', 'palavras-do-dia'];
    const catLabels = { despedidas: 'Despedidas', essenciais: 'Essenciais', idiomaticas: 'Expressões Idiomáticas', 'palavras-do-dia': 'Palavras do Dia' };

    // Despedidas get a comparison block first
    const despedidas = rest.filter(e => e.category === 'despedidas');
    if (despedidas.length) {
      const t = document.createElement('div');
      t.className = 'section-title'; t.textContent = 'Despedidas';
      container.appendChild(t);
      container.appendChild(makeFarewellComparison());
      const grid = document.createElement('div');
      grid.className = 'exp-grid';
      despedidas.forEach(e => grid.appendChild(makeCard(e)));
      container.appendChild(grid);
    }

    catOrder.filter(c => c !== 'despedidas').forEach(cat => {
      const group = rest.filter(e => e.category === cat);
      if (!group.length) return;
      const t = document.createElement('div');
      t.className = 'section-title'; t.textContent = catLabels[cat];
      container.appendChild(t);
      const grid = document.createElement('div');
      grid.className = 'exp-grid';
      group.forEach(e => grid.appendChild(makeCard(e)));
      container.appendChild(grid);
    });
  } else {
    if (activeCategory === 'despedidas') container.appendChild(makeFarewellComparison());
    const grid = document.createElement('div');
    grid.className = 'exp-grid';
    rest.forEach(e => grid.appendChild(makeCard(e)));
    container.appendChild(grid);
  }
}

function makeFarewellComparison() {
  const block = document.createElement('div');
  block.className = 'compare-block';
  block.innerHTML = `<div class="compare-title">Quando usar cada despedida?</div>`;
  const rows = [
    { pt: 'Até já',          en: 'See you soon',       note: 'same day · very soon' },
    { pt: 'Até logo',        en: 'See you later',       note: 'later today · near future' },
    { pt: 'Até amanhã',      en: 'See you tomorrow',    note: 'exactly tomorrow' },
    { pt: 'Até à próxima',   en: 'Until next time',     note: 'open-ended · more formal' },
  ];
  rows.forEach(r => {
    const row = document.createElement('div');
    row.className = 'compare-row';
    row.innerHTML = `<span class="cr-pt">${r.pt}</span><span class="cr-en">${r.en}</span><span class="cr-note">${r.note}</span>`;
    row.onclick = () => speak(r.pt + '.', null);
    block.appendChild(row);
  });
  return block;
}

function makeCard(e) {
  const card = document.createElement('div');
  card.className = 'exp-card' + (e.featured ? ' featured' : '');

  const registerTag = e.register === 'informal'
    ? `<span class="exp-tag tag-register-informal">informal</span>`
    : `<span class="exp-tag tag-register-formal">formal</span>`;
  const lessonTag = `<span class="exp-tag tag-lesson">${e.lesson}</span>`;
  const featuredTag = e.featured ? `<span class="exp-tag tag-essential">essencial</span>` : '';

  const examples = e.examples.map(ex => `
    <div class="exp-example" onclick="speak('${ex.pt.replace(/<[^>]+>/g,'').replace(/'/g,"\\'")}', null)">
      <div class="ex-pt">${ex.pt}</div>
      <div class="ex-en">${ex.en}</div>
    </div>`).join('');

  card.innerHTML = `
    <div class="exp-header">
      <div class="exp-pt" onclick="speak('${e.pt.replace(/'/g,"\\'")}', null)">${e.pt}</div>
      <button class="exp-speak" onclick="speak('${e.pt.replace(/'/g,"\\'")}', this)">🔊</button>
    </div>
    <div class="exp-en">${e.en}</div>
    <div class="exp-tags">${featuredTag}${registerTag}${lessonTag}</div>
    <div class="exp-body">${e.body}</div>
    ${examples ? `<div class="exp-examples">${examples}</div>` : ''}
  `;
  return card;
}

// ── FLASHCARDS ────────────────────────────────────────────────────
function buildFCDeck() {
  fcDeck = EXPRESSOES.map(e => ({
    pt: e.pt,
    en: e.en,
    cat: CATEGORIES.find(c => c.id === e.category)?.label || '',
    ex_pt: e.examples[0]?.pt.replace(/<[^>]+>/g, '') || '',
    ex_en: e.examples[0]?.en || '',
  }));
}

function renderFC() {
  const c = fcDeck[fcIdx];
  fcRevealed = false;
  document.getElementById('fcCounter').textContent = `${fcIdx + 1} / ${fcDeck.length}`;
  document.getElementById('fcProgressFill').style.width = `${((fcIdx + 1) / fcDeck.length) * 100}%`;
  document.getElementById('fcCatTag').textContent = c.cat;
  document.getElementById('fcEnPrompt').textContent = c.en;
  document.getElementById('fcPtAnswer').textContent = c.pt;
  document.getElementById('fcPtAnswer').className = 'fc-pt-answer';
  document.getElementById('fcExPt').textContent = c.ex_pt;
  document.getElementById('fcExPt').className = 'fc-ex-pt';
  document.getElementById('fcExEn').textContent = c.ex_en;
  document.getElementById('fcExEn').className = 'fc-ex-en';
  document.getElementById('fcHints').textContent = 'clique para revelar · 🔊 para ouvir';
  document.getElementById('fcSpeakPill').classList.remove('playing');
}

function revealFC() {
  if (fcRevealed) return;
  fcRevealed = true;
  document.getElementById('fcPtAnswer').classList.add('revealed');
  document.getElementById('fcExPt').classList.add('revealed');
  document.getElementById('fcExEn').classList.add('revealed');
  document.getElementById('fcHints').textContent = '';
}

function speakFC()   { speak(fcDeck[fcIdx].pt, document.getElementById('fcSpeakPill')); }
function speakFCEx() { speak(fcDeck[fcIdx].ex_pt, document.getElementById('fcExPt')); }
function fcMove(dir) { fcIdx = (fcIdx + dir + fcDeck.length) % fcDeck.length; renderFC(); }
function shuffleFC() { fcDeck = [...fcDeck].sort(() => Math.random() - 0.5); fcIdx = 0; renderFC(); }
function resetFC()   { buildFCDeck(); fcIdx = 0; renderFC(); }

// ── TAB ───────────────────────────────────────────────────────────
function switchTab(id, tabEl) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  tabEl.classList.add('active');
  if (id === 'flashcards') renderFC();
}

// ── INIT ──────────────────────────────────────────────────────────
buildCatBar();
renderExpressoes();
buildFCDeck();
renderFC();
</script>
