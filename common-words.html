<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Palavras Mais Comuns</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
    --bg: #f9f6f0;
    --surface: #ffffff;
    --surface2: #f2ede6;
    --border: #e0d8cc;
    --border2: #ccc4b4;
    --green: #2d7a50;
    --green-light: #eef5f1;
    --green-mid: #9acbb0;
    --red: #a03428;
    --red-light: #fdf2f1;
    --red-mid: #dba09a;
    --yellow: #b07d2a;
    --blue: #2d7a50;
    --text: #2e2820;
    --muted: #8a7a68;
    --muted2: #b0a090;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header {
    padding: 1.5rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 1.5rem; flex-wrap: wrap;
  }
  .level-badge {
    font-family: var(--mono); font-size: 0.75rem; font-weight: 600;
    color: #ffffff; background: var(--green);
    padding: 0.2rem 0.6rem; border-radius: 3px; letter-spacing: 0.05em;
  }
  header h1 { font-family: var(--mono); font-size: 1rem; font-weight: 400; color: var(--muted); flex: 1; }
  header h1 span { color: var(--yellow); }

  .tabs {
    display: flex; border-bottom: 1px solid var(--border); padding: 0 2rem;
  }
  .tab {
    font-family: var(--mono); font-size: 0.8rem; padding: 0.75rem 1.25rem;
    cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
    transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
    letter-spacing: 0.03em;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .view { display: none; padding: 1.5rem 2rem; }
  .view.active { display: block; }

  /* ── TABELA ── */
  .search-bar {
    display: flex; gap: 0.75rem; margin-bottom: 1.25rem; align-items: center;
  }
  .search-bar input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.6rem 0.9rem; color: var(--text);
    font-family: var(--sans); font-size: 0.9rem; outline: none;
  }
  .search-bar input:focus { border-color: var(--blue); }
  .search-bar input::placeholder { color: var(--muted); }
  .count-badge {
    font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    padding: 0.3rem 0.7rem; border-radius: 3px; white-space: nowrap;
  }

  .word-table { width: 100%; border-collapse: collapse; }
  .word-table thead tr { border-bottom: 1px solid var(--border2); }
  .word-table th {
    font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); padding: 0.5rem 0.75rem;
    text-align: left; font-weight: 400;
  }
  .word-table th.num { width: 2.5rem; text-align: right; }
  .word-table th.pt { width: 18%; }
  .word-table th.def { width: 28%; }
  .word-table th.ex { width: 54%; }

  .word-row {
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .word-row:hover { background: var(--surface); }
  .word-row td { padding: 0 0.75rem; vertical-align: top; }

  .td-main { display: flex; align-items: center; gap: 0.5rem; padding: 0.7rem 0; }

  td.num {
    font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
    text-align: right; padding-right: 0.75rem; vertical-align: middle;
  }
  .pt-word {
    font-family: var(--mono); font-size: 0.95rem; color: var(--green); font-weight: 600;
    cursor: pointer;
  }
  .pt-word:hover { text-decoration: underline; }
  .speak-btn {
    background: none; border: none; cursor: pointer; font-size: 0.75rem;
    color: var(--muted); padding: 0.1rem 0.2rem; line-height: 1;
    transition: color 0.15s; flex-shrink: 0;
  }
  .speak-btn:hover { color: var(--blue); }
  .speak-btn.playing { color: var(--blue); }

  .def-cell { font-size: 0.85rem; color: var(--text); padding: 0.7rem 0.75rem; }
  .pos-tag {
    font-family: var(--mono); font-size: 0.6rem; color: var(--blue);
    background: rgba(74,158,255,0.1); border: 1px solid rgba(74,158,255,0.2);
    padding: 0.1rem 0.35rem; border-radius: 2px; margin-left: 0.4rem;
    vertical-align: middle; white-space: nowrap;
  }

  /* Example expansion */
  .ex-cell {
    padding: 0 0.75rem 0 0; font-size: 0.82rem; color: var(--muted);
    max-width: 0; overflow: hidden; transition: all 0.2s;
  }
  .word-row.expanded .ex-cell {
    max-width: none; padding: 0.5rem 0.75rem 0.7rem 0;
  }
  .ex-pt { color: var(--text); display: block; margin-bottom: 0.2rem; font-style: italic; }
  .ex-en { color: var(--muted); display: block; font-size: 0.78rem; }

  .expand-hint {
    font-family: var(--mono); font-size: 0.6rem; color: var(--muted);
    margin-bottom: 0.75rem; opacity: 0.7;
  }

  /* ── FLASHCARDS ── */
  /* Top nav: counter + utility controls */
  .fc-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem; gap: 1rem;
  }
  .fc-counter { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }
  .fc-nav-right { display: flex; gap: 0.5rem; align-items: center; }
  .fc-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 0.5rem 1rem; border-radius: 4px;
    cursor: pointer; font-family: var(--mono); font-size: 0.8rem; transition: all 0.15s;
  }
  .fc-btn:hover { border-color: var(--green); color: var(--yellow); }
  .fc-btn:disabled { opacity: 0.3; cursor: default; }
  .fc-mode-btn { color: var(--yellow); border-color: var(--green); letter-spacing: 0.05em; }

  /* Card — flex column, content packed toward center */
  .fc-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; min-height: 340px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start;
    transition: border-color 0.2s; padding: 1rem 2rem 1.25rem; text-align: center;
    position: relative; gap: 0;
  }

  /* Card number top-left */
  .fc-card-num {
    position: absolute; top: 0.85rem; left: 1.25rem;
    font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
  }

  /* Hints row — top center of card */
  .fc-hints {
    display: flex; gap: 1.25rem; justify-content: center;
    margin-bottom: 1.25rem; margin-top: 0.1rem; width: 100%;
  }
  .fc-hint-item { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); }

  /* English prompt */
  .fc-en { font-size: 1.05rem; color: var(--text); line-height: 1.5; margin-bottom: 1rem; }

  /* Divider */
  .fc-divider { width: 2rem; height: 1px; background: var(--border2); margin-bottom: 1rem; }

  /* Portuguese answer — blurred until clicked */
  .fc-pt-word {
    font-family: var(--mono); font-size: 2rem; color: var(--green); font-weight: 600;
    filter: blur(7px); transition: filter 0.3s; cursor: pointer; line-height: 1.2;
    margin-bottom: 1.25rem;
  }
  .fc-pt-word.revealed { filter: blur(0); background: transparent; }

  /* Speak button — centered on card between answer and example */
  .fc-card-speak {
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px;
    color: var(--muted); font-size: 1rem; padding: 0.35rem 1.25rem;
    cursor: pointer; transition: all 0.15s; line-height: 1;
    margin-bottom: 1.1rem;
  }
  .fc-card-speak:hover { border-color: var(--blue); color: var(--blue); }
  .fc-card-speak.playing { border-color: var(--blue); color: var(--blue); }

  /* Example — blurred, clickable for audio */
  .fc-ex-pt {
    font-style: italic; font-size: 0.85rem; color: var(--text);
    filter: blur(5px); transition: filter 0.3s; cursor: pointer;
    margin-bottom: 0.25rem;
  
    background: var(--border);
    border-radius: 3px;
    padding: 0.05rem 0.3rem;
  }
  .fc-ex-pt.revealed { filter: blur(0); background: transparent; }
  .fc-ex-en {
    font-size: 0.78rem; color: var(--muted);
    filter: blur(5px); transition: filter 0.3s;
    margin-bottom: 1.25rem;
  
    background: var(--border);
    border-radius: 3px;
    padding: 0.05rem 0.3rem;
  }
  .fc-ex-en.revealed { filter: blur(0); background: transparent; }

  /* Prev / Next inside card, centered at bottom */
  .fc-card-nav {
    display: flex; gap: 1rem; align-items: center; margin-top: auto; padding-top: 0.5rem;
  }
  .fc-card-nav .fc-btn { min-width: 5rem; }

  .fc-progress {
    margin-top: 0.75rem; height: 2px; background: var(--border);
    border-radius: 1px; overflow: hidden;
  }
  .fc-progress-fill { height: 100%; background: var(--green); transition: width 0.3s; }

  /* ── QUIZ ── */
  .quiz-wrap { max-width: 560px; margin: 0 auto; }
  .quiz-score-bar {
    font-family: var(--mono); font-size: 0.75rem; color: var(--muted);
    display: flex; justify-content: space-between; margin-bottom: 1.5rem;
  }
  .quiz-score-bar span { color: var(--text); }
  .quiz-question {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 2rem; text-align: center; margin-bottom: 1.5rem;
  }
  .quiz-label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); margin-bottom: 0.75rem; }
  .quiz-word { font-family: var(--mono); font-size: 2rem; color: var(--green); font-weight: 600; }
  .quiz-ex { font-size: 0.82rem; color: var(--muted); margin-top: 0.75rem; font-style: italic; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .quiz-opt {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.9rem 1rem; cursor: pointer;
    font-size: 0.88rem; color: var(--text); transition: all 0.15s;
    text-align: center; font-family: var(--sans);
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--green); }
  .quiz-opt.correct { border-color: #1a5c38; background: rgba(76,175,138,0.1); color: #1a5c38; }
  .quiz-opt.wrong { border-color: #8b2018; background: rgba(224,92,92,0.1); color: #8b2018; }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback { text-align: center; font-family: var(--mono); font-size: 0.85rem; min-height: 1.5rem; margin-bottom: 1rem; }
  .quiz-feedback.ok { color: #1a5c38; }
  .quiz-feedback.bad { color: #8b2018; }
  .quiz-next {
    display: block; margin: 0 auto; font-family: var(--mono); font-size: 0.85rem;
    padding: 0.6rem 2rem; background: var(--green); color: #ffffff;
    border: none; border-radius: 4px; cursor: pointer; font-weight: 600;
  }
  .quiz-next:disabled { opacity: 0.3; cursor: default; }
  .quiz-done { text-align: center; padding: 3rem 0; }
  .quiz-done .final-score { font-family: var(--mono); font-size: 2.5rem; color: var(--yellow); margin-bottom: 0.5rem; }
  .quiz-done p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .quiz-restart {
    font-family: var(--mono); font-size: 0.85rem; padding: 0.6rem 2rem;
    background: var(--green); color: #ffffff; border: none;
    border-radius: 4px; cursor: pointer; font-weight: 600;
  }
</style>
</head>
<body>

<header>
<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;width:100%;">
<div style="flex:1;">
  <span class="level-badge">VOCAB</span>
  <h1>100 Palavras Mais Comuns · <span>Most Common Portuguese Words</span></h1>
</div>
  <!-- Portuguese Flag -->
  <svg style="flex-shrink:0;width:48px;height:32px;border-radius:3px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.15);margin-top:2px;" viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="19.2" height="32" fill="#006600"/>
    <rect x="19.2" y="0" width="28.8" height="32" fill="#FF0000"/>
    <circle cx="19.2" cy="16" r="7" fill="none" stroke="#FFCC00" stroke-width="1.2"/>
    <circle cx="19.2" cy="16" r="4.5" fill="none" stroke="#FFCC00" stroke-width="0.8"/>
    <line x1="19.2" y1="11.5" x2="19.2" y2="20.5" stroke="#FFCC00" stroke-width="0.8"/>
    <line x1="14.7" y1="16" x2="23.7" y2="16" stroke="#FFCC00" stroke-width="0.8"/>
    <line x1="16" y1="12.8" x2="22.4" y2="19.2" stroke="#FFCC00" stroke-width="0.6"/>
    <line x1="22.4" y1="12.8" x2="16" y2="19.2" stroke="#FFCC00" stroke-width="0.6"/>
    <rect x="17" y="13.5" width="4.4" height="5" fill="white" rx="0.5"/>
    <circle cx="19.2" cy="16" r="0.8" fill="#003399"/>
    <circle cx="17.7" cy="14.5" r="0.5" fill="#003399"/>
    <circle cx="20.7" cy="14.5" r="0.5" fill="#003399"/>
    <circle cx="17.7" cy="17.5" r="0.5" fill="#003399"/>
    <circle cx="20.7" cy="17.5" r="0.5" fill="#003399"/>
  </svg>
</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('tabela')">Tabela</button>
  <button class="tab" onclick="switchTab('flashcards')">Flashcards</button>
  <button class="tab" onclick="switchTab('quiz')">Quiz</button>
</div>

<!-- TABELA -->
<div id="tabela" class="view active">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search words, definitions, examples…" oninput="filterTable()">
    <span class="count-badge" id="countBadge">100 words</span>
  </div>
  <p class="expand-hint">↓ click any row to reveal the example sentence</p>
  <table class="word-table">
    <thead>
      <tr>
        <th class="num">#</th>
        <th class="pt">Português</th>
        <th class="def">Definition</th>
        <th class="ex">Example</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- FLASHCARDS -->
<div id="flashcards" class="view">
  <div class="fc-nav">
    <span class="fc-counter" id="fcCounter">1 / 100</span>
    <div class="fc-nav-right">
      <button class="fc-btn fc-mode-btn" id="fcModeBtn" onclick="fcToggleMode()">E&rarr;P</button>
      <button class="fc-btn" onclick="fcShuffle()">Shuffle</button>
      <button class="fc-btn" onclick="fcReset()">Reset</button>
    </div>
  </div>
  <div class="fc-card" id="fcCard">
    <span class="fc-card-num" id="fcCardNum"></span>
    <div class="fc-hints">
      <span class="fc-hint-item">&#128266; hear answer</span>
      <span class="fc-hint-item">click word to unblur</span>
      <span class="fc-hint-item">click example to hear</span>
    </div>
    <div class="fc-en" id="fcEn"></div>
    <div class="fc-divider"></div>
    <div id="fcPtWord" class="fc-pt-word" onclick="fcRevealWord()"></div>
    <button class="fc-card-speak" id="fcCardSpeak" onclick="fcSpeakAnswer()">&#128266;</button>
    <div id="fcExPt" class="fc-ex-pt" onclick="fcSpeakExample()"></div>
    <div id="fcExEn" class="fc-ex-en"></div>
    <div class="fc-card-nav">
      <button class="fc-btn" id="fcPrev" onclick="fcMove(-1)">&larr; Prev</button>
      <button class="fc-btn" id="fcNext" onclick="fcMove(1)">Next &rarr;</button>
    </div>
  </div>
  <div class="fc-progress"><div class="fc-progress-fill" id="fcProgressFill"></div></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="view">
  <div class="quiz-wrap">
    <div class="quiz-score-bar">
      <span>Score: <span id="qScore">0</span> / <span id="qTotal">0</span></span>
      <span id="qStreak"></span>
    </div>
    <div id="quizActive">
      <div class="quiz-question">
        <div class="quiz-label">What does this word mean?</div>
        <div class="quiz-word" id="qWord"></div>
        <div class="quiz-ex" id="qEx"></div>
      </div>
      <div class="quiz-options" id="qOptions"></div>
      <div class="quiz-feedback" id="qFeedback"></div>
      <button class="quiz-next" id="qNext" onclick="nextQuestion()" disabled>Next →</button>
    </div>
    <div id="quizDone" class="quiz-done" style="display:none">
      <div class="final-score" id="qFinalScore"></div>
      <p id="qFinalMsg"></p>
      <button class="quiz-restart" onclick="startQuiz()">Try Again</button>
    </div>
  </div>
</div>

<script>
const WORKER_URL = "https://portuguese-tts.drh-dave.workers.dev";

const WORDS = [
  { pt: "pra", def: "colloquial contraction of 'para a' (to the/for the)", ex_pt: "Por que não vamos pra casa?", ex_en: "Why don't we go home?" },
  { pt: "também", def: "also; too", ex_pt: "Sim, também está lá.", ex_en: "Yes, it's there too." },
  { pt: "vocês", def: "you (plural)", ex_pt: "O que eu posso fazer por vocês?", ex_en: "What can I do for you?" },
  { pt: "quê", def: "what (used in fixed expressions)", ex_pt: "Não tem de quê.", ex_en: "Don't mention it." },
  { pt: "algo", def: "something; anything", ex_pt: "\"Algo mais?\" \"Não, é só.\"", ex_en: "\"Anything else?\" \"No, that's all.\"" },
  { pt: "obrigado", def: "thank you (masc. speaker)", ex_pt: "Obrigado. Eu estou bem.", ex_en: "Thanks, I'm fine." },
  { pt: "dia", def: "day", ex_pt: "É o dia do Senhor.", ex_en: "It's the day of the Lord." },
  { pt: "esse", def: "that (masc., near listener)", ex_pt: "Eu acho que esse é meu.", ex_en: "I think this is mine." },
  { pt: "lhe", def: "to/for him, her, you (formal)", ex_pt: "Quem lhe disse isso?", ex_en: "Who told him that?" },
  { pt: "este", def: "this (masc., near speaker)", ex_pt: "Este é meu e esse é seu.", ex_en: "This is mine, and this is yours." },
  { pt: "ir", def: "to go", ex_pt: "Não sei para onde ir.", ex_en: "I don't know where to go." },
  { pt: "deus", def: "God; god (lowercase)", ex_pt: "É \"Deus\" ou \"deus\"?", ex_en: "Is it \"God\" or \"god\"?" },
  { pt: "essa", def: "that (fem., near listener)", ex_pt: "O que você vai fazer essa noite?", ex_en: "What are you going to do this evening?" },
  { pt: "oh", def: "oh! (interjection)", ex_pt: "Oh, meu Deus!", ex_en: "Oh, my God!" },
  { pt: "melhor", def: "better; best", ex_pt: "Você não tem nada melhor para fazer?", ex_en: "Don't you have anything better to do?" },
  { pt: "ainda", def: "still; yet", ex_pt: "Eles ainda não estão aqui.", ex_en: "They aren't here yet." },
  { pt: "temos", def: "we have", ex_pt: "Nós temos o que temos.", ex_en: "We have what we have." },
  { pt: "cara", def: "face; guy (colloq.)", ex_pt: "Ele lhe disse cara a cara.", ex_en: "He told him right to his face." },
  { pt: "sem", def: "without", ex_pt: "Estou sem tempo agora.", ex_en: "I don't have time now." },
  { pt: "pai", def: "father; dad", ex_pt: "Onde já está o seu pai?", ex_en: "Where's your father now?" },
  { pt: "sempre", def: "always", ex_pt: "Sempre foi assim.", ex_en: "That was always so." },
  { pt: "vida", def: "life", ex_pt: "Assim é a vida!", ex_en: "Such is life!" },
  { pt: "vez", def: "turn; time (occurrence)", ex_pt: "É a minha vez?", ex_en: "Is it my turn?" },
  { pt: "homem", def: "man; male", ex_pt: "Tem um homem aqui que quer te ver.", ex_en: "There's a man here that wants to see you." },
  { pt: "estamos", def: "we are", ex_pt: "Aqui estamos.", ex_en: "Here we are." },
  { pt: "talvez", def: "maybe; perhaps", ex_pt: "Sim. Não. Talvez. Não sei.", ex_en: "Yes. No. Maybe. I don't know." },
  { pt: "mãe", def: "mother; mom", ex_pt: "Esta é a minha mãe.", ex_en: "This is my mother." },
  { pt: "anos", def: "years", ex_pt: "Isso foi há anos.", ex_en: "That was years ago." },
  { pt: "alguém", def: "someone; somebody", ex_pt: "Alguém pode nos ver.", ex_en: "Someone might see us." },
  { pt: "depois", def: "after; afterwards", ex_pt: "Depois de você.", ex_en: "After you." },
  { pt: "verdade", def: "truth", ex_pt: "Ela ainda não sabe a verdade.", ex_en: "She doesn't know the truth yet." },
  { pt: "claro", def: "clear; of course (colloq.)", ex_pt: "Está claro.", ex_en: "It's clear." },
  { pt: "boa", def: "good (fem.)", ex_pt: "Não sou boa para você.", ex_en: "I'm no good for you." },
  { pt: "nem", def: "neither; not even", ex_pt: "Nem eu.", ex_en: "Me neither." },
  { pt: "pouco", def: "little; few; a bit", ex_pt: "Estamos com pouco tempo.", ex_en: "We're short on time." },

// ── AUDIO ──
const audioCache = {};
async function speak(text, btnEl) {
  if (!WORKER_URL) return;
  if (btnEl) { btnEl.classList.add('playing'); }
  try {
    let url;
    if (audioCache[text]) {
      url = audioCache[text];
    } else {
      const resp = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const blob = await resp.blob();
      url = URL.createObjectURL(blob);
      audioCache[text] = url;
    }
    const audio = new Audio(url);
    audio.onended = () => { if (btnEl) btnEl.classList.remove('playing'); };
    audio.play();
  } catch(e) {
    if (btnEl) btnEl.classList.remove('playing');
  }
}

// ── TABELA ──
let filteredWords = [...WORDS];
function buildTable(words) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  words.forEach((w, i) => {
    const globalIdx = WORDS.indexOf(w) + 1;
    const tr = document.createElement('tr');
    tr.className = 'word-row';
    tr.innerHTML = `
      <td class="num">${globalIdx}</td>
      <td>
        <div class="td-main">
          <span class="pt-word" onclick="event.stopPropagation(); speak('${w.pt.replace(/'/g,"\\'")}', this.previousElementSibling)">${w.pt}</span>
          <button class="speak-btn" onclick="event.stopPropagation(); speak('${w.pt.replace(/'/g,"\\'")}', this)" title="Play audio">🔊</button>
        </div>
      </td>
      <td class="def-cell">${w.def}</td>
      <td class="ex-cell">
        <span class="ex-pt">${w.ex_pt}</span>
        <span class="ex-en">${w.ex_en}</span>
      </td>
    `;
    tr.addEventListener('click', () => tr.classList.toggle('expanded'));
    tbody.appendChild(tr);
  });
  document.getElementById('countBadge').textContent = `${words.length} word${words.length !== 1 ? 's' : ''}`;
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredWords = WORDS.filter(w =>
    w.pt.toLowerCase().includes(q) ||
    w.def.toLowerCase().includes(q) ||
    w.ex_pt.toLowerCase().includes(q) ||
    w.ex_en.toLowerCase().includes(q)
  );
  buildTable(filteredWords);
}

buildTable(WORDS);

// ── FLASHCARDS ──
let fcDeck = [...WORDS];
let fcIdx = 0;
let fcMode = 'EP'; // 'EP' = English front (default); 'PE' = Portuguese front

function fcRender() {
  const w = fcDeck[fcIdx];
  // Reset blur state
  document.getElementById('fcPtWord').classList.remove('revealed');
  document.getElementById('fcExPt').classList.remove('revealed');
  document.getElementById('fcExEn').classList.remove('revealed');

  document.getElementById('fcCardNum').textContent = `${fcIdx + 1} / ${fcDeck.length}`;
  document.getElementById('fcCounter').textContent = `${fcIdx + 1} / ${fcDeck.length}`;
  document.getElementById('fcPrev').disabled = fcIdx === 0;
  document.getElementById('fcNext').disabled = fcIdx === fcDeck.length - 1;
  document.getElementById('fcProgressFill').style.width = `${((fcIdx + 1) / fcDeck.length) * 100}%`;

  if (fcMode === 'EP') {
    // English prompt visible, Portuguese answer blurred
    document.getElementById('fcEn').textContent = w.def;
    document.getElementById('fcPtWord').textContent = w.pt;
  } else {
    // Portuguese prompt visible, English answer blurred
    document.getElementById('fcEn').textContent = w.pt;
    document.getElementById('fcPtWord').textContent = w.def;
  }
  document.getElementById('fcExPt').textContent = w.ex_pt;
  document.getElementById('fcExEn').textContent = w.ex_en;
}

function fcRevealWord() {
  document.getElementById('fcPtWord').classList.toggle('revealed');
}

function fcSpeakAnswer() {
  const w = fcDeck[fcIdx];
  speak(fcMode === 'EP' ? w.pt : w.def, document.getElementById('fcCardSpeak'));
}

function fcSpeakExample() {
  const w = fcDeck[fcIdx];
  // Reveal example on click, then play audio
  document.getElementById('fcExPt').classList.add('revealed');
  document.getElementById('fcExEn').classList.add('revealed');
  speak(w.ex_pt, document.getElementById('fcExPt'));
}

function fcToggleMode() {
  fcMode = fcMode === 'EP' ? 'PE' : 'EP';
  document.getElementById('fcModeBtn').textContent = fcMode === 'EP' ? 'E→P' : 'P→E';
  fcRender();
}

function fcMove(dir) { fcIdx = Math.max(0, Math.min(fcDeck.length - 1, fcIdx + dir)); fcRender(); }
function fcShuffle() { fcDeck = [...WORDS].sort(() => Math.random() - 0.5); fcIdx = 0; fcRender(); }
function fcReset() { fcDeck = [...WORDS]; fcIdx = 0; fcRender(); }

fcRender();

// ── QUIZ ──
let qPool = [], qIdx = 0, qCorrect = 0, qTotal = 0, qAnswered = false;

function startQuiz() {
  qPool = [...WORDS].sort(() => Math.random() - 0.5);
  qIdx = 0; qCorrect = 0; qTotal = 0; qAnswered = false;
  document.getElementById('quizDone').style.display = 'none';
  document.getElementById('quizActive').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  if (qIdx >= qPool.length) { showQuizDone(); return; }
  qAnswered = false;
  const w = qPool[qIdx];
  document.getElementById('qWord').textContent = w.pt;
  document.getElementById('qEx').textContent = w.ex_pt;
  document.getElementById('qFeedback').textContent = '';
  document.getElementById('qFeedback').className = 'quiz-feedback';
  document.getElementById('qNext').disabled = true;
  document.getElementById('qScore').textContent = qCorrect;
  document.getElementById('qTotal').textContent = qTotal;

  const wrong = WORDS.filter(x => x !== w).sort(() => Math.random() - 0.5).slice(0, 3);
  const opts = [w, ...wrong].sort(() => Math.random() - 0.5);
  const container = document.getElementById('qOptions');
  container.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = o.def;
    btn.onclick = () => {
      if (qAnswered) return;
      qAnswered = true; qTotal++;
      const correct = o === w;
      if (correct) { qCorrect++; btn.classList.add('correct'); document.getElementById('qFeedback').textContent = '✓ Correct!'; document.getElementById('qFeedback').className = 'quiz-feedback ok'; }
      else { btn.classList.add('wrong'); document.getElementById('qFeedback').textContent = `✗  "${w.def}"`; document.getElementById('qFeedback').className = 'quiz-feedback bad'; }
      container.querySelectorAll('.quiz-opt').forEach(b => { b.disabled = true; if (b.textContent === w.def && !correct) b.classList.add('correct'); });
      document.getElementById('qScore').textContent = qCorrect;
      document.getElementById('qTotal').textContent = qTotal;
      document.getElementById('qNext').disabled = false;
    };
    container.appendChild(btn);
  });
}

function nextQuestion() { qIdx++; renderQuestion(); }

function showQuizDone() {
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizDone').style.display = 'block';
  const pct = Math.round((qCorrect / qTotal) * 100);
  document.getElementById('qFinalScore').textContent = `${qCorrect} / ${qTotal}`;
  document.getElementById('qFinalMsg').textContent = pct >= 80 ? 'Excelente! 🎉' : pct >= 60 ? 'Muito bem! Keep going.' : 'Keep practicing — it takes time.';
}

startQuiz();

// ── TAB SWITCHING ──
function switchTab(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}
