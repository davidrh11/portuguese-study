<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frases do Dia a Dia</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
    --bg: #f9f6f0;
    --surface: #ffffff;
    --surface2: #f2ede6;
    --border: #e0d8cc;
    --border2: #ccc4b4;
    --green: #2d7a50;
    --green-light: #eef5f1;
    --green-mid: #9acbb0;
    --red: #a03428;
    --red-light: #fdf2f1;
    --red-mid: #dba09a;
    --yellow: #b07d2a;
    --blue: #2d7a50;
    --text: #2e2820;
    --muted: #8a7a68;
    --muted2: #b0a090;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header {
    padding: 1.5rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 1.5rem; flex-wrap: wrap;
  }
  .level-badge {
    font-family: var(--mono); font-size: 0.75rem; font-weight: 600;
    color: var(--text); background: var(--green);
    padding: 0.2rem 0.6rem; border-radius: 3px; letter-spacing: 0.05em;
  }
  header h1 { font-family: var(--mono); font-size: 1rem; font-weight: 400; color: var(--muted); flex: 1; }
  header h1 span { color: var(--yellow); }

  /* CATEGORY BAR */
  .cat-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-btn {
    background: none; border: none; color: var(--muted);
    font-family: var(--mono); font-size: 0.75rem;
    padding: 0.75rem 1.1rem; cursor: pointer;
    border-bottom: 2px solid transparent; white-space: nowrap;
    transition: all 0.2s; letter-spacing: 0.03em;
  }
  .cat-btn:hover { color: var(--text); }
  .cat-btn.active { color: var(--green); border-bottom-color: var(--green); }

  /* MODE TABS */
  .tabs {
    display: flex; border-bottom: 1px solid var(--border); padding: 0 2rem;
  }
  .tab {
    font-family: var(--mono); font-size: 0.8rem; padding: 0.75rem 1.25rem;
    cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
    transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .view { display: none; padding: 1.5rem 2rem 3rem; }
  .view.active { display: block; }

  /* REGISTER TAGS */
  .tag {
    font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.06em;
    padding: 0.1rem 0.4rem; border-radius: 2px; white-space: nowrap;
  }
  .tag-formal   { color: var(--blue);  background: rgba(74,158,255,0.1);  border: 1px solid rgba(74,158,255,0.25); }
  .tag-informal { color: #1a5c38; background: rgba(76,175,138,0.1);  border: 1px solid rgba(76,175,138,0.25); }
  .tag-colloq   { color: #c97cf0;      background: rgba(201,124,240,0.1); border: 1px solid rgba(201,124,240,0.25); }
  .tag-a2       { color: #8b2018;   background: rgba(224,92,92,0.08);  border: 1px solid rgba(224,92,92,0.2); }

  /* TABELA */
  .section-title {
    font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: #8b2018; margin: 2rem 0 0.75rem;
  }
  .section-title:first-child { margin-top: 0; }

  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-bottom: 0.5rem; }
  th {
    font-family: var(--mono); font-size: 0.65rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
    text-align: left; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border);
  }
  td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td.pt-cell {
    font-family: var(--mono); font-size: 0.88rem; color: var(--yellow);
    width: 40%; cursor: pointer;
  }
  td.pt-cell:hover { text-decoration: underline; text-decoration-color: var(--yellow); text-underline-offset: 3px; }
  td.en-cell { color: var(--text); width: 42%; }
  td.tag-cell { width: 18%; }

  .note-block {
    background: var(--surface); border-left: 3px solid var(--red);
    padding: 0.85rem 1.1rem; margin: 1rem 0 1.5rem; border-radius: 0 4px 4px 0;
    font-size: 0.82rem; color: var(--muted); line-height: 1.6;
  }
  .note-block strong { color: var(--yellow); font-family: var(--mono); font-weight: 600; }

  /* FLASHCARDS */
  .fc-wrap { max-width: 580px; margin: 0 auto; }

  .fc-topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.75rem;
  }
  .fc-counter { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }
  .fc-topbar-right { display: flex; gap: 0.5rem; }
  .fc-ctrl {
    font-family: var(--mono); font-size: 0.78rem;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 0.4rem 0.9rem; border-radius: 4px; cursor: pointer;
    transition: all 0.15s;
  }
  .fc-ctrl:hover { border-color: var(--green); color: var(--yellow); }

  .fc-progress { height: 2px; background: var(--border); border-radius: 1px; margin-bottom: 1.5rem; overflow: hidden; }
  .fc-progress-fill { height: 100%; background: var(--green); transition: width 0.3s; }

  .fc-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    min-height: 320px; display: flex; flex-direction: column;
    align-items: center; padding: 1.5rem 2rem 1.5rem; text-align: center;
    transition: border-color 0.2s;
  }

  .fc-hints {
    font-family: var(--mono); font-size: 0.62rem; color: var(--muted);
    letter-spacing: 0.06em; margin-bottom: 1.25rem; width: 100%; text-align: center;
  }

  .fc-cat-tag {
    font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--blue); margin-bottom: 1rem;
  }

  .fc-en-prompt {
    font-size: 1.25rem; color: var(--text); font-weight: 300;
    line-height: 1.5; margin-bottom: 1.25rem; padding: 0 0.5rem;
  }

  .fc-register { margin-bottom: 1.25rem; }

  .fc-divider { width: 2rem; height: 1px; background: var(--border); margin-bottom: 1.25rem; }

  .fc-pt-answer {
    font-family: var(--mono); font-size: 1.35rem; color: var(--yellow);
    filter: blur(7px); transition: filter 0.3s; cursor: pointer;
    line-height: 1.4; margin-bottom: 1.25rem; padding: 0 0.5rem;
  
    background: var(--border);
    border-radius: 4px;
    padding: 0.1rem 0.4rem;
  }
  .fc-pt-answer.revealed { filter: blur(0); background: transparent; }

  .fc-speak-pill {
    background: var(--surface2); border: 1px solid var(--border); color: var(--blue);
    padding: 0.35rem 1.2rem; border-radius: 99px; cursor: pointer;
    transition: all 0.2s; font-size: 1rem; margin-bottom: 1.5rem;
  }
  .fc-speak-pill:hover, .fc-speak-pill.playing { background: var(--green); color: var(--text); border-color: var(--blue); }

  .fc-nav { display: flex; gap: 1rem; }
  .fc-nav-btn {
    font-family: var(--mono); font-size: 0.82rem;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 0.55rem 1.25rem; border-radius: 4px;
    cursor: pointer; transition: all 0.15s;
  }
  .fc-nav-btn:hover { border-color: var(--green); color: var(--yellow); }

  /* QUIZ */
  .quiz-wrap { max-width: 560px; margin: 0 auto; }
  .quiz-score-bar {
    font-family: var(--mono); font-size: 0.75rem; color: var(--muted);
    display: flex; justify-content: space-between; margin-bottom: 1.5rem;
  }
  .quiz-q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 2rem; text-align: center; margin-bottom: 1.25rem;
  }
  .quiz-label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .quiz-phrase { font-family: var(--mono); font-size: 1.25rem; color: var(--green); line-height: 1.4; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .quiz-opt {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.85rem 1rem; cursor: pointer;
    font-size: 0.85rem; color: var(--text); text-align: center;
    transition: all 0.15s; font-family: var(--sans); line-height: 1.4;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--green); }
  .quiz-opt.correct { border-color: #1a5c38; background: rgba(76,175,138,0.1); color: #1a5c38; }
  .quiz-opt.wrong   { border-color: #8b2018;   background: rgba(224,92,92,0.1);  color: #8b2018; }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback { text-align: center; font-family: var(--mono); font-size: 0.82rem; min-height: 1.4rem; margin-bottom: 1rem; }
  .quiz-feedback.ok  { color: #1a5c38; }
  .quiz-feedback.bad { color: #8b2018; }
  .quiz-next {
    display: block; margin: 0 auto; font-family: var(--mono); font-size: 0.85rem;
    padding: 0.6rem 2rem; background: var(--green); color: var(--text);
    border: none; border-radius: 4px; cursor: pointer; font-weight: 600;
  }
  .quiz-next:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<header>
<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;width:100%;">
<div style="flex:1;">
  <span class="level-badge">A1</span>
  <h1>Frases do Dia a Dia · <span>Everyday Phrases</span></h1>
</div>
  <!-- Portuguese Flag -->
  <svg style="flex-shrink:0;width:48px;height:32px;border-radius:3px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.15);margin-top:2px;" viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg">

    <line x1="16" y1="12.8" x2="22.4" y2="19.2" stroke="#FFCC00" stroke-width="0.6"/>
    <line x1="22.4" y1="12.8" x2="16" y2="19.2" stroke="#FFCC00" stroke-width="0.6"/>
    <rect x="17" y="13.5" width="4.4" height="5" fill="white" rx="0.5"/>

    <circle cx="17.7" cy="14.5" r="0.5" fill="#003399"/>
    <circle cx="20.7" cy="14.5" r="0.5" fill="#003399"/>
    <circle cx="17.7" cy="17.5" r="0.5" fill="#003399"/>
    <circle cx="20.7" cy="17.5" r="0.5" fill="#003399"/>
  </svg>
</div>
</header>

<div class="cat-bar" id="catBar"></div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('tabela', this)">Tabela</button>
  <button class="tab" onclick="switchTab('flashcards', this)">Flashcards</button>
  <button class="tab" onclick="switchTab('quiz', this)">Quiz</button>
</div>

<!-- TABELA -->
<div id="tabela" class="view active">
  <div id="tabelaContent"></div>
</div>

<!-- FLASHCARDS -->
<div id="flashcards" class="view">
  <div class="fc-wrap">
    <div class="fc-topbar">
      <span class="fc-counter" id="fcCounter">1 / 1</span>
      <div class="fc-topbar-right">
        <button class="fc-ctrl" onclick="shuffleFC()">⇄ Baralhar</button>
        <button class="fc-ctrl" onclick="resetFC()">↺ Reiniciar</button>
      </div>
    </div>
    <div class="fc-progress"><div class="fc-progress-fill" id="fcProgressFill" style="width:0%"></div></div>
    <div class="fc-card" id="fcCard">
      <div class="fc-hints" id="fcHints">clique na frase para revelar · 🔊 para ouvir</div>
      <div class="fc-cat-tag" id="fcCatTag"></div>
      <div class="fc-en-prompt" id="fcEnPrompt"></div>
      <div class="fc-register" id="fcRegister"></div>
      <div class="fc-divider"></div>
      <div class="fc-pt-answer" id="fcPtAnswer" onclick="revealFC()"></div>
      <button class="fc-speak-pill" id="fcSpeakPill" onclick="speakCurrent()">🔊</button>
      <div class="fc-nav">
        <button class="fc-nav-btn" onclick="fcMove(-1)">← Anterior</button>
        <button class="fc-nav-btn" onclick="fcMove(1)">Próximo →</button>
      </div>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="view">
  <div class="quiz-wrap">
    <div class="quiz-score-bar">
      <span>Categoria: <span id="quizCatLabel" style="color:var(--text)">Tudo</span></span>
      <span>Score: <span id="quizScore" style="color:var(--text)">0 / 0</span></span>
    </div>
    <div class="quiz-q-card">
      <div class="quiz-label">Como se diz em português?</div>
      <div class="quiz-phrase" id="quizPhrase"></div>
    </div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <button class="quiz-next" id="quizNext" onclick="nextQuiz()" disabled>Próximo →</button>
  </div>
</div>

      { pt: 'Desculpe, estou atrasado. Chego dentro de 5min.', en: "Sorry, I'm late. I'll be there in 5 minutes.", register: 'informal', note: null },
      { pt: 'Demoro 10 minutos.', en: "I'll take 10 minutes.", register: 'informal', note: 'demorar = to take time / to be slow' },
      { pt: 'Desculpe, estou com pressa.', en: "Sorry, I'm in a hurry.", register: 'informal', note: null },
      { pt: 'Vou já.', en: "I'm coming / I'll be right there.", register: 'informal', note: null },
      { pt: 'Estou a caminho.', en: "I'm on my way.", register: 'informal', note: null },
      { pt: 'Ainda tenho tempo.', en: 'I still have time.', register: 'informal', note: null },
      { pt: 'Não tenho tempo.', en: "I don't have time.", register: 'informal', note: null },
    ]
  }
];

const ALL_PHRASES = CATEGORIES.flatMap(c => c.phrases.map(p => ({ ...p, category: c.label, catId: c.id })));

// ── AUDIO ─────────────────────────────────────────────────────────
const audioCache = {};
let currentAudio = null;

async function speakText(text, btnEl) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (btnEl) btnEl.classList.add('playing');
  try {
    if (audioCache[text]) {
      audioCache[text].currentTime = 0;
      audioCache[text].onended = () => { if (btnEl) btnEl.classList.remove('playing'); };
      audioCache[text].play();
      return;
    }
    const res = await fetch(WORKER_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) throw new Error();
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audioCache[text] = audio;
    currentAudio = audio;
    audio.onended = () => { if (btnEl) btnEl.classList.remove('playing'); };
    audio.play();
  } catch(e) {
    if (btnEl) btnEl.classList.remove('playing');
  }
}

// ── REGISTER TAGS ─────────────────────────────────────────────────
function registerTag(r) {
  const map = {
    formal:   ['formal',   'tag-formal'],
    informal: ['informal', 'tag-informal'],
    colloq:   ['coloquial','tag-colloq'],
  };
  const [label, cls] = map[r] || ['', ''];
  return label ? `<span class="tag ${cls}">${label}</span>` : '';
}

// ── STATE ─────────────────────────────────────────────────────────
let activeCatId = 'all';
let activeTab = 'tabela';
let fcDeck = [], fcIdx = 0, fcRevealed = false;
let quizDeck = [], quizIdx = 0, quizCorrect = 0, quizTotal = 0, quizAnswered = false;

// ── CATEGORY BAR ──────────────────────────────────────────────────
function buildCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active'; allBtn.textContent = 'Tudo';
  allBtn.onclick = () => selectCat('all', allBtn);
  bar.appendChild(allBtn);
  CATEGORIES.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-btn'; b.textContent = c.label; b.dataset.id = c.id;
    b.onclick = () => selectCat(c.id, b);
    bar.appendChild(b);
  });
}

function selectCat(id, btn) {
  activeCatId = id;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (activeTab === 'tabela') renderTabela();
  else if (activeTab === 'flashcards') initFC();
  else initQuiz();
}

function getActiveWords() {
  if (activeCatId === 'all') return ALL_PHRASES;
  const cat = CATEGORIES.find(c => c.id === activeCatId);
  return cat ? cat.phrases.map(p => ({ ...p, category: cat.label, catId: cat.id })) : ALL_PHRASES;
}

// ── TABELA ─────────────────────────────────────────────────────────
function renderTabela() {
  const container = document.getElementById('tabelaContent');
  container.innerHTML = '';
  const words = getActiveWords();

  const renderSection = (label, phrases) => {
    if (label) {
      const h = document.createElement('div');
      h.className = 'section-title'; h.textContent = label;
      container.appendChild(h);
    }
    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Português</th><th>English</th><th>Registo</th></tr></thead>`;
    const tbody = document.createElement('tbody');
    phrases.forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="pt-cell">${p.pt}</td>
        <td class="en-cell">${p.en}</td>
        <td class="tag-cell">${registerTag(p.register)}</td>
      `;
      tr.querySelector('.pt-cell').addEventListener('click', () => speakText(p.pt, null));
      if (p.note) {
        const noteRow = document.createElement('tr');
        noteRow.innerHTML = `<td colspan="3" style="padding:0 1rem 0.75rem; border-bottom:1px solid var(--border)"><div class="note-block">${p.note}</div></td>`;
        tr.addEventListener('click', (e) => {
          if (e.target.classList.contains('pt-cell')) return;
          noteRow.style.display = noteRow.style.display === 'none' ? '' : 'none';
        });
        noteRow.style.display = 'none';
        tbody.appendChild(tr);
        tbody.appendChild(noteRow);
      } else {
        tbody.appendChild(tr);
      }
    });
    table.appendChild(tbody);
    container.appendChild(table);
  };

  if (activeCatId === 'all') {
    CATEGORIES.forEach(cat => {
      const phrases = words.filter(p => p.catId === cat.id);
      if (phrases.length) renderSection(cat.label, phrases);
    });
  } else {
    renderSection(null, words);
  }
}

// ── FLASHCARDS ─────────────────────────────────────────────────────
function initFC() {
  fcDeck = [...getActiveWords()];
  fcIdx = 0; fcRevealed = false;
  renderFC();
}

function renderFC() {
  const w = fcDeck[fcIdx];
  fcRevealed = false;
  document.getElementById('fcCounter').textContent = `${fcIdx + 1} / ${fcDeck.length}`;
  document.getElementById('fcProgressFill').style.width = `${((fcIdx + 1) / fcDeck.length) * 100}%`;
  document.getElementById('fcCatTag').textContent = w.category || '';
  document.getElementById('fcEnPrompt').textContent = w.en;
  document.getElementById('fcRegister').innerHTML = registerTag(w.register);
  document.getElementById('fcPtAnswer').textContent = w.pt;
  document.getElementById('fcPtAnswer').classList.remove('revealed');
  document.getElementById('fcHints').textContent = 'clique na frase para revelar · 🔊 para ouvir';
  document.getElementById('fcSpeakPill').classList.remove('playing');
}

function revealFC() {
  if (fcRevealed) return;
  fcRevealed = true;
  document.getElementById('fcPtAnswer').classList.add('revealed');
  document.getElementById('fcHints').textContent = '';
}

function fcMove(dir) {
  fcIdx = (fcIdx + dir + fcDeck.length) % fcDeck.length;
  renderFC();
}
function shuffleFC() { fcDeck = [...getActiveWords()].sort(() => Math.random() - 0.5); fcIdx = 0; renderFC(); }
function resetFC()   { fcDeck = [...getActiveWords()]; fcIdx = 0; renderFC(); }
function speakCurrent() { speakText(fcDeck[fcIdx].pt, document.getElementById('fcSpeakPill')); }

// ── QUIZ ───────────────────────────────────────────────────────────
function initQuiz() {
  quizDeck = [...getActiveWords()].sort(() => Math.random() - 0.5);
  quizIdx = 0; quizCorrect = 0; quizTotal = 0; quizAnswered = false;
  document.getElementById('quizCatLabel').textContent = activeCatId === 'all' ? 'Tudo' : CATEGORIES.find(c => c.id === activeCatId)?.label || '';
  renderQuiz();
}

function renderQuiz() {
  if (quizIdx >= quizDeck.length) {
    quizDeck = [...getActiveWords()].sort(() => Math.random() - 0.5);
    quizIdx = 0;
  }
  quizAnswered = false;
  const item = quizDeck[quizIdx];
  document.getElementById('quizPhrase').textContent = item.en;
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  document.getElementById('quizNext').disabled = true;
  document.getElementById('quizScore').textContent = `${quizCorrect} / ${quizTotal}`;

  const pool = ALL_PHRASES.filter(x => x.pt !== item.pt);
  const wrongs = pool.sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.pt);
  const opts = [item.pt, ...wrongs].sort(() => Math.random() - 0.5);

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt'; btn.textContent = opt;
    btn.onclick = () => checkQuiz(btn, opt, item.pt);
    container.appendChild(btn);
  });
}

function checkQuiz(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true; quizTotal++;
  const fb = document.getElementById('quizFeedback');
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  if (chosen === correct) {
    quizCorrect++;
    fb.textContent = 'Correto! ✓'; fb.className = 'quiz-feedback ok';
  } else {
    btn.classList.add('wrong');
    fb.textContent = 'Errado.'; fb.className = 'quiz-feedback bad';
  }
  document.getElementById('quizNext').disabled = false;
  document.getElementById('quizScore').textContent = `${quizCorrect} / ${quizTotal}`;
  speakText(quizDeck[quizIdx].pt, null);
}

function nextQuiz() { quizIdx++; renderQuiz(); }

// ── TAB SWITCHING ──────────────────────────────────────────────────
function switchTab(id, tabEl) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  tabEl.classList.add('active');
  activeTab = id;
  if (id === 'tabela') renderTabela();
  else if (id === 'flashcards') initFC();
  else initQuiz();
}

// ── INIT ──────────────────────────────────────────────────────────
buildCatBar();
renderTabela();
initFC();
</script>
